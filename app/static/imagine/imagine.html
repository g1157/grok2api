<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok2API - Imagine</title>
  <link rel="icon" href="/static/favicon/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-mono/style.css" rel="stylesheet">
  <link href="/static/common/common.css?v=3" rel="stylesheet">
  <link href="/static/common/toast.css" rel="stylesheet">
  <link href="/static/imagine/imagine.css?v=5" rel="stylesheet">
</head>

<body class="min-h-screen flex flex-col" style="background-color: var(--bg);">

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>
  <div id="app-header"></div>

  <!-- Main Content -->
  <main class="space-y-6 flex-1 container mx-auto max-w-4xl px-6 py-8 fade-in">

    <!-- Stats Row -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
      <div class="stat-card">
        <div class="stat-value" id="stat-total">-</div>
        <div class="stat-label">Token 总数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-available">-</div>
        <div class="stat-label">可用</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-gallery">-</div>
        <div class="stat-label">已生成</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-status">-</div>
        <div class="stat-label">服务状态</div>
      </div>
    </div>

    <!-- Generation Form -->
    <div class="space-y-4">
      <div class="flex flex-wrap justify-between items-start gap-3">
        <div>
          <h2 class="text-2xl font-semibold tracking-tight">图片生成</h2>
          <p class="text-[var(--accents-4)] mt-1 text-sm">使用 Grok Imagine 生成图片。</p>
        </div>
      </div>

      <div class="space-y-3">
        <div>
          <label class="text-xs font-medium text-[var(--accents-5)] mb-1 block">Prompt</label>
          <textarea id="prompt" rows="3" class="geist-input w-full resize-none"
            placeholder="描述你想生成的图片..."></textarea>
        </div>
        <div class="flex flex-wrap items-end gap-3">
          <div class="flex-1 min-w-[120px]">
            <label class="text-xs font-medium text-[var(--accents-5)] mb-1 block">比例</label>
            <select id="aspect-ratio" class="geist-input w-full">
              <option value="1:1">1:1 方形</option>
              <option value="2:3" selected>2:3 竖版</option>
              <option value="3:2">3:2 横版</option>
            </select>
          </div>
          <div class="flex-1 min-w-[80px]">
            <label class="text-xs font-medium text-[var(--accents-5)] mb-1 block">数量</label>
            <select id="count" class="geist-input w-full">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="4" selected>4</option>
            </select>
          </div>
          <div class="flex items-center h-[32px]">
            <label class="flex items-center gap-2 cursor-pointer text-sm text-[var(--accents-5)]">
              <input type="checkbox" id="stream" checked
                class="w-3.5 h-3.5 accent-black rounded">
              <span class="text-xs">Stream</span>
            </label>
          </div>
          <button id="btn-generate" onclick="generateImages()" class="geist-button gap-2">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
            </svg>
            生成
          </button>
        </div>
      </div>
    </div>

    <div class="imagine-workflow-box space-y-3">
      <div class="flex flex-wrap justify-between items-start gap-3">
        <div>
          <h2 class="text-xl font-semibold tracking-tight">全局工作流</h2>
          <p class="text-[var(--accents-4)] mt-1 text-sm">与 Chat 页共享 parentPostId 记忆，支持“生图 → 编辑 → 生视频”无重复上传。</p>
        </div>
        <button onclick="resolveWorkflowParentPostId()" class="geist-button-outline text-xs px-3">解析 parentPostId</button>
      </div>
      <div class="imagine-workflow-body">
        <div id="workflow-preview" class="imagine-workflow-preview">
          <span class="workflow-empty-tip">未选择工作图</span>
        </div>
        <div class="imagine-workflow-meta">
          <div>已选图片：<code id="workflow-selected-url">-</code></div>
          <div>parentPostId：<code id="workflow-parent-post-id">-</code></div>
        </div>
      </div>
    </div>

    <!-- Progress Panel -->
    <div id="progress-panel" class="hidden">
      <div class="space-y-2">
        <div class="flex items-center justify-between">
          <span id="progress-stage" class="text-xs font-medium text-[var(--accents-5)]">准备中...</span>
          <span id="progress-status" class="text-xs text-[var(--accents-4)]"></span>
        </div>
        <div class="imagine-progress-track">
          <div id="progress-bar" class="imagine-progress-fill" style="width: 0%"></div>
        </div>
      </div>
    </div>

    <!-- Gallery -->
    <div class="space-y-4">
      <div class="flex flex-wrap justify-between items-start gap-3">
        <div>
          <h2 class="text-2xl font-semibold tracking-tight">图片库</h2>
          <p class="text-[var(--accents-4)] mt-1 text-sm">已生成的图片。</p>
        </div>
        <button onclick="clearGallery()" class="geist-button-danger text-xs px-3">清空</button>
      </div>
      <div id="gallery" class="imagine-gallery">
        <p class="text-[var(--accents-4)] col-span-full text-center py-8 text-sm">暂无图片</p>
      </div>
    </div>

    <!-- SSO Token Status -->
    <div class="space-y-4">
      <div class="flex flex-wrap justify-between items-start gap-3">
        <div>
          <h2 class="text-2xl font-semibold tracking-tight">SSO Token 状态</h2>
          <p class="text-[var(--accents-4)] mt-1 text-sm">用于 Imagine 生图的 Token 池状态。</p>
        </div>
        <div class="flex gap-2">
          <button onclick="reloadSso()" class="geist-button-outline text-xs px-3">重新加载</button>
          <button onclick="resetDailyUsage()" class="geist-button-outline text-xs px-3">重置用量</button>
        </div>
      </div>
      <div class="overflow-x-auto">
        <table class="imagine-table w-full">
          <thead>
            <tr>
              <th>Token</th>
              <th>今日用量</th>
              <th>剩余</th>
              <th>状态</th>
              <th>可用</th>
            </tr>
          </thead>
          <tbody id="sso-tbody">
            <tr>
              <td colspan="5" class="text-center text-[var(--accents-4)] py-4">加载中...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <!-- Lightbox -->
  <div id="lightbox" class="modal-overlay hidden" onclick="closeLightbox(event)">
    <div class="imagine-lightbox-frame">
      <button id="lightbox-close" type="button" class="imagine-lightbox-close" onclick="closeLightbox(event)" aria-label="关闭预览">×</button>
      <img id="lightbox-img" src="" alt="" class="max-w-full max-h-[90vh] rounded-lg shadow-2xl">
    </div>
  </div>

  <script src="/static/common/draggable.js"></script>
  <script src="/static/common/admin-auth.js?v=3"></script>
  <script src="/static/common/header.js?v=4"></script>
  <script src="/static/common/footer.js?v=1"></script>
  <script src="/static/common/toast.js"></script>
  <script src="/static/imagine/imagine.js?v=5"></script>
</body>

</html>
